 晚上在甲米镇夜市吃晚餐（如周末的 Walking Street 市集）","🏨 然后返回 Ao Nang Townhouse 住宿"]},audio:qe.day2},{day:3,date:{en:"Mar 1 (Sun)",zh:"3月1日（周日）"},title:{en:"Transfer to Koh Lanta & Check-in Fresh House",zh:"前往兰塔岛，入住 Fresh House"},region:"lanta",regionLabel:{en:"Koh Lanta",zh:"兰塔岛"},mapQuery:"Fresh House, Sriraya, Lanta Old Town, Koh Lanta, Thailand",accommodation:{en:"Fresh House (Sriraya, Lanta Old Town, Koh Lanta Yai, Koh Lanta, Thailand 81150)",zh:"Fresh House（Sriraya, Lanta Old Town, Koh Lanta Yai, Koh Lanta, Thailand 81150）"},activities:{en:["📦 Morning: Check out from Ao Nang Townhouse","🚐 Travel from Ao Nang/Krabi to Koh Lanta (Lanta Old Town) by van + ferry (2.5–4 hours)","🏨 Arrive in the afternoon, check in to Fresh House (check-in from 13:00)","🌅 Late afternoon: Walk to the beach or explore Lanta Old Town, enjoy sunset","🍜 Evening: Dinner at a beachfront restaurant; ask tour agents about 4-island tours and Phi Phi day trips"],zh:["📦 早上：从 Ao Nang Townhouse 退房，准备前往兰塔岛","🚐 从安南/甲米一带乘面包车+渡船前往兰塔岛老城，车船合计约2.5–4小时","🏨 下午抵达后，入住 Fresh House（13:00后可办理入住）","🌅 傍晚：在海滩散步或逛兰塔老城，看日落","🍜 晚上：在海边餐厅吃饭，并在旅行社咨询四岛游和皮皮岛一日游"]},audio:qe.day3},{day:4,date:{en:"Mar 2 (Mon)",zh:"3月2日（周一）"},title:{en:"Island Exploration from Fresh House",zh:"兰塔环岛探索"},region:"lanta",regionLabel:{en:"Koh Lanta",zh:"兰塔岛"},mapQuery:"Koh Lanta Old Town, Thailand",accommodation:{en:"Fresh House (Sriraya, Lanta Old Town, Koh Lanta Yai, Koh Lanta, Thailand 81150)",zh:"Fresh House（Sriraya, Lanta Old Town, Koh Lanta Yai, Koh Lanta, Thailand 81150）"},activities:{en:["🛵 Spend the day exploring Koh Lanta by scooter or tuk-tuk","🏖️ Visit quiet southern beaches, viewpoints, and cafés","🏘️ Explore Lanta Old Town (walking distance from Fresh House)","🏞️ If energy and weather allow, visit the national park & lighthouse area for cliff and sea views","💻 WORK CALL 15:00-17:00 (Thailand local time) — Find quiet spot at accommodation or nearby café with WiFi","🌙 Evening: Dine near Fresh House in Old Town"],zh:["🛵 白天租摩托车或坐嘟嘟车环岛","🏖️ 去南部僻静海滩、各个观景点和咖啡馆","🏘️ 逛 Lanta Old Town（从 Fresh House 步行可达）","🏞️ 视体力和天气，可以去国家公园灯塔附近看悬崖和海景","💻 工作电话 15:00-17:00（泰国当地时间）— 在住宿或附近咖啡馆找安静地方，确保有WiFi","🌙 晚上在 Fresh House 附近的 Old Town 用餐"]},audio:qe.day4},{day:5,date:{en:"Mar 3 (Tue)",zh:"3月3日（周二）"},title:{en:"Phi Phi Islands Overnight",zh:"皮皮岛过夜游"},region:"lanta",regionLabel:{en:"Koh Phi Phi",zh:"皮皮岛"},mapQuery:"Phi Phi Twin Palms Bungalow, Ko Phi Phi, Thailand",accommodation:{en:"Phi Phi Twin Palms Bungalow (108, Moo 7, Ao Nang Subdistrict, Meuang Karbi District, Ko Phi Phi, Thailand 81000)",zh:"Phi Phi Twin Palms Bungalow（108, Moo 7, Ao Nang Subdistrict, Meuang Karbi District, Ko Phi Phi, Thailand 81000）"},activities:{en:["📦 Morning: Check out from Fresh House (by 12:00)","🛥️ Take a speedboat or ferry from Koh Lanta to Phi Phi Islands (check-in from 14:00)","📸 Visit Maya Bay, Pileh Lagoon, and Monkey Bay with snorkeling","🍱 Lunch on the boat or on Phi Phi Don","🏨 Check in to Phi Phi Twin Palms Bungalow (check-in from 14:00)","🌙 Evening: Explore Tonsai area, dinner and drinks on Phi Phi Don"],zh:["📦 早上：从 Fresh House 退房（12:00前）","🛥️ 从兰塔乘快艇或渡船前往皮皮岛（14:00后可入住）","📸 游览 Maya Bay、Pileh Lagoon、Monkey Bay 并浮潜","🍱 午餐在皮皮 Don 岛或船上吃","🏨 入住 Phi Phi Twin Palms Bungalow（14:00后可办理入住）","🌙 晚上：探索 Tonsai 区域，在皮皮 Don 岛晚餐"]},audio:qe.day5},{day:6,date:{en:"Mar 4 (Wed)",zh:"3月4日（周三）"},title:{en:"Return to Koh Lanta & Check-in BOHO Hostel",zh:"返回兰塔岛，入住 BOHO Hostel"},region:"lanta",regionLabel:{en:"Koh Lanta",zh:"兰塔岛"},mapQuery:"BOHO Hostel, Saladan, Koh Lanta, Thailand",accommodation:{en:"BOHO Hostel (150 Moo 1, Saladan, Koh Lanta, Thailand 81150)",zh:"BOHO Hostel（150 Moo 1, Saladan, Koh Lanta, Thailand 81150）"},activities:{en:["📦 Morning: Check out from Phi Phi Twin Palms Bungalow (by 11:00)","🛥️ Take ferry/speedboat back to Koh Lanta (Saladan)","🏨 Check in to BOHO Hostel (check-in from 14:00)","🌅 Afternoon: Walk to Long Beach area or explore Sala Dan village","💻 WORK CALL 14:00-16:00 (Thailand local time) — BOHO Hostel has good WiFi, find quiet corner or use private room","🍜 Evening: Dinner at a beachfront restaurant near Saladan"],zh:["📦 早上：从 Phi Phi Twin Palms Bungalow 退房（11:00前）","🛥️ 乘渡船/快艇返回兰塔岛（Sala Dan）","🏨 入住 BOHO Hostel（14:00后可办理入住）","🌅 下午：步行前往 Long Beach 一带或在 Sala Dan 小镇逛逛","💻 工作电话 14:00-16:00（泰国当地时间）— BOHO Hostel WiFi不错，找安静角落或使用私人房间","🍜 晚上：在 Saladan 附近的海边餐厅吃饭"]},audio:qe.day6},{day:7,date:{en:"Mar 5 (Thu)",zh:"3月5日（周四）"},title:{en:"Four Islands Tour & Last Night at BOHO Hostel",zh:"四岛游，BOHO Hostel 最后一晚"},region:"lanta",regionLabel:{en:"Koh Lanta",zh:"兰塔岛"},mapQuery:"Koh Lanta Four Islands, Thailand",accommodation:{en:"BOHO Hostel (150 Moo 1, Saladan, Koh Lanta, Thailand 81150)",zh:"BOHO Hostel（150 Moo 1, Saladan, Koh Lanta, Thailand 81150）"},activities:{en:["🛥️ Join a 4-island tour from Koh Lanta (pickup from Saladan area)","🤿 Snorkeling, beach stops on small islands, and visit to Emerald Cave","🍱 Simple lunch on board or on a beach","🏖️ Spend the day in clear water between islands","💆 Return by late afternoon; dinner by the sea and enjoy a relaxing massage"],zh:["🛥️ 参加从兰塔出发的「四岛游」，从 Sala Dan 一带接送","🤿 浮潜、在小岛沙滩上停留，游泳穿过 Emerald Cave 到隐藏小泻湖","🍱 午餐在船上或小岛上简单解决","🏖️ 白天在清澈海水里浮潜、玩沙","💆 傍晚返回兰塔岛，在海边吃饭，做个按摩放松"]},audio:qe.day7},{day:8,date:{en:"Mar 6 (Fri)",zh:"3月6日（周五）"},title:{en:"Transfer to Koh Lipe & Check-in Varin Beach Resort",zh:"前往丽贝岛，入住 Varin Beach Resort"},region:"lipe",regionLabel:{en:"Koh Lipe",zh:"丽贝岛"},mapQuery:"Varin Beach Resort, Ko Lipe, Thailand",accommodation:{en:"Varin Beach Resort (171 M7, Ko Lipe, Thailand 91000)",zh:"Varin Beach Resort（171 M7, Ko Lipe, Thailand 91000）"},activities:{en:["📦 Morning: Check out from BOHO Hostel (by 10:00) and head to Saladan Pier","🛥️ Take booked speedboat/ferry from Saladan Pier to Koh Lipe Pattaya Beach (~10:30 departure, 2.5–3 hrs)","🏨 Arrive around midday; walk or short transfer to Varin Beach Resort; check in after 15:00","🏖️ Afternoon: Walk along Pattaya Beach or Sunrise Beach, explore the three main beaches and Walking Street","🍜 Evening: Choose a restaurant along Walking Street for your first island dinner"],zh:["📦 早上10:00前从 BOHO Hostel 退房，前往 Saladan 码头","🛥️ 乘坐已预订的快艇/渡船前往丽贝岛 Pattaya Beach，约10:30出发，航程约2.5–3小时","🏨 中午或下午早些时候抵达，步行或短程接驳前往 Varin Beach Resort；15:00后可办理入住","🏖️ 下午：在 Pattaya Beach 或 Sunrise Beach 散步，熟悉三大海滩和 Walking Street 的大致方向","🍜 晚上：在 Walking Street 上找餐厅吃饭，感受小岛夜晚氛围"]},audio:qe.day8},{day:9,date:{en:"Mar 7 (Sat)",zh:"3月7日（周六）"},title:{en:"Snorkeling & Island Hopping",zh:"浮潜和跳岛"},region:"lipe",regionLabel:{en:"Koh Lipe",zh:"丽贝岛"},mapQuery:"Koh Lipe, Satun, Thailand",accommodation:{en:"Varin Beach Resort (171 M7, Ko Lipe, Thailand 91000)",zh:"Varin Beach Resort（171 M7, Ko Lipe, Thailand 91000）"},activities:{en:["🤿 Join a half-day or full-day snorkeling trip around Koh Lipe","🐠 Visit nearby islands for coral reefs and tropical fish","🍱 Simple lunch on a small island or on the boat","🏖️ Relax on quiet sandy beaches","🌅 Return by late afternoon for sunset on the beach, then revisit a favourite restaurant"],zh:["🤿 参加半日或一日的浮潜团，去丽贝周边小岛","🐠 看珊瑚和热带鱼","🍱 中午一般在小岛或船上吃简餐","🏖️ 在无人小沙滩上发呆","🌅 傍晚回到丽贝本岛看日落，晚上回到喜欢的餐厅用餐"]},audio:qe.day9},{day:10,date:{en:"Mar 8 (Sun)",zh:"3月8日（周日）"},title:{en:"Sunrise & Relaxation",zh:"日出和放空"},region:"lipe",regionLabel:{en:"Koh Lipe",zh:"丽贝岛"},mapQuery:"Sunrise Beach, Koh Lipe, Thailand",accommodation:{en:"Varin Beach Resort (171 M7, Ko Lipe, Thailand 91000)",zh:"Varin Beach Resort（171 M7, Ko Lipe, Thailand 91000）"},activities:{en:["🌅 Wake up early to watch sunrise at Sunrise Beach","☕ Breakfast at Varin Beach Resort (included)","🏖️ Keep the daytime schedule empty: swim, sunbathe, read, and relax","📖 No fixed plan — enjoy freedom","💆 Evening: Foot or full-body massage, stay in island-chill mode"],zh:["🌅 早起去 Sunrise Beach 看日出","☕ 在 Varin Beach Resort 吃早餐（已含）","🏖️ 白天什么都不用安排：游泳、晒太阳、看书、发呆","📖 随心所欲，没有固定计划","💆 晚上做个脚部或全身按摩，继续小岛躺平模式"]},audio:qe.day10},{day:11,date:{en:"Mar 9 (Mon)",zh:"3月9日（周一）"},title:{en:"Resort Day",zh:"度假村日"},region:"lipe",regionLabel:{en:"Koh Lipe",zh:"丽贝岛"},mapQuery:"Varin Beach Resort
